<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Learning — Selectors aur Properties</title>
    <style>
        .bg-black {
            background-color: #212121;
            color: #fff;
            font-family: system-ui, -apple-system, sans-serif;
            padding: 20px;
        }
    </style>
</head>
<body class="bg-black">
    <div>
        <h1 id="title" class="heading">DOM Learning <span style="display: none;">test text</span></h1>
        <h2>Lorem ipsum dolor sit.</h2>
        <h2>Lorem ipsum dolor sit.</h2>
        <h2>Lorem ipsum dolor sit.</h2>
        <p>Lorem ipsum dolor sit amet.</p>
        <input type="password" name="user-password" id="user-password">

        <ul>
            <li class="list-item">one</li>
            <li class="list-item">two</li>
            <li class="list-item">three</li>
            <li class="list-item">four</li>
        </ul>
    </div>
<script>
    // ============================================
    // DOM Selectors aur Properties (Modern JS)
    // ============================================

    // getElementById — sabse fast selector
    const title = document.getElementById('title');
    console.log("getElementById:", title);

    // querySelector — CSS selector syntax (pehla match return karta hai)
    const heading = document.querySelector('.heading');
    console.log("querySelector:", heading);
    console.log("textContent:", heading.textContent);   // Hidden text bhi include karta hai
    console.log("innerText:", heading.innerText);       // Sirf visible text
    console.log("innerHTML:", heading.innerHTML);       // Raw HTML

    // querySelectorAll — NodeList return karta hai (saare matches)
    const allItems = document.querySelectorAll('.list-item');
    console.log("querySelectorAll:", allItems);         // NodeList
    console.log("Length:", allItems.length);

    // NodeList pe directly forEach chalti hai:
    allItems.forEach((item) => {
        console.log("List item:", item.textContent);
    });

    // Array me convert karo full array methods ke liye:
    const itemsArray = Array.from(allItems);
    const filtered = itemsArray.filter((item) => item.textContent !== "two");
    console.log("Filtered items:", filtered.map(i => i.textContent));

    // getElementsByClassName — HTMLCollection return karta hai (live)
    const listItems = document.getElementsByClassName('list-item');
    console.log("HTMLCollection:", listItems);
    // HTMLCollection me forEach NAHI hai — pehle Array me convert karo:
    // Array.from(listItems).forEach(...)

    // Elements modify karna
    title.textContent = "DOM Learning — Modern JS";  // Safe hai (XSS risk nahi)
    // title.innerHTML = "<b>Bold</b>";               // Dhyan se use karo (XSS risk hai)
</script>
</body>
</html>
