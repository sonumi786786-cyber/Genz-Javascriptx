<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bind() — Classes me 'this' Preserve Karna</title>
</head>
<body style="background-color: #212121; color: #fff; font-family: system-ui, sans-serif; padding: 20px;">
    <h2>bind() vs Arrow Function</h2>
    <button id="bind-btn" style="padding: 12px 24px; font-size: 16px; cursor: pointer; margin: 5px;">bind() Button</button>
    <button id="arrow-btn" style="padding: 12px 24px; font-size: 16px; cursor: pointer; margin: 5px;">Arrow Function Button</button>
</body>
<script>
    // ============================================
    // bind() — 'this' Context Preserve Karna
    // ============================================

    // -----------------------------------------
    // Method 1: bind() — Classic approach
    // -----------------------------------------

    class ReactBind {
        constructor() {
            this.library = "React";
            this.server = "https://localhost:3000";

            // bind(this) naya function banata hai jisme 'this' permanently bound hota hai
            document
                .querySelector('#bind-btn')
                .addEventListener('click', this.handleClick.bind(this));
        }

        handleClick() {
            console.log("bind() — Library:", this.library);
            console.log("bind() — Server:", this.server);
        }
    }

    // -----------------------------------------
    // Method 2: Arrow Function — Modern approach
    // -----------------------------------------

    class ReactArrow {
        constructor() {
            this.library = "React";
            this.server = "https://localhost:3000";

            // Arrow function 'this' ko enclosing scope se inherit karta hai
            document
                .querySelector('#arrow-btn')
                .addEventListener('click', () => this.handleClick());
        }

        handleClick() {
            console.log("Arrow — Library:", this.library);
            console.log("Arrow — Server:", this.server);
        }
    }

    // -----------------------------------------
    // Method 3: Class Fields (Sabse Modern — ES2022)
    // -----------------------------------------

    // class ReactClassField {
    //     library = "React";
    //     server = "https://localhost:3000";
    //
    //     // Arrow function as class field — auto-bind karta hai 'this'
    //     handleClick = () => {
    //         console.log("Class field — Library:", this.library);
    //     };
    //
    //     constructor() {
    //         document.querySelector('#btn')
    //             .addEventListener('click', this.handleClick);
    //         // Na .bind() chahiye na wrapper!
    //     }
    // }

    const app1 = new ReactBind();
    const app2 = new ReactArrow();

    /*
     Event Listeners me 'this' handle karne ke 3 tarike:
     1. .bind(this)            — Classic, explicit
     2. Arrow wrapper          — () => this.method()
     3. Arrow class field      — method = () => {} (ES2022, sabse concise)

     Teeno kaam karte hain. Arrow class fields sabse modern approach hai.
    */
</script>
</html>
