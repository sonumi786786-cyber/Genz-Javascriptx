<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>setInterval aur clearInterval — Modern JS</title>
</head>
<body style="background-color: #212121; color: #fff; font-family: system-ui, sans-serif; padding: 20px;">
    <h1>Chai aur Javascript</h1>
    <p id="timestamp" style="font-size: 24px; font-family: monospace;"></p>
    <button id="start" style="padding: 10px 20px; font-size: 16px; cursor: pointer;">Start</button>
    <button id="stop" style="padding: 10px 20px; font-size: 16px; cursor: pointer;">Stop</button>
</body>
<script>
    // ============================================
    // setInterval aur clearInterval — Modern JS
    // ============================================

    // setInterval ek function ko fixed intervals pe repeatedly run karta hai

    const display = document.querySelector('#timestamp');
    let intervalId = null;

    const sayDate = (prefix) => {
        const now = new Date().toLocaleTimeString();
        console.log(`${prefix} ${now}`);
        display.textContent = `${prefix} ${now}`;
    };

    // Start/Stop pattern — multiple intervals stack hone se rokata hai
    document.querySelector('#start').addEventListener('click', () => {
        if (!intervalId) {
            intervalId = setInterval(sayDate, 1000, "Time:");
            console.log("Timer start ho gaya");
        }
    });

    document.querySelector('#stop').addEventListener('click', () => {
        if (intervalId) {
            clearInterval(intervalId);
            intervalId = null; // Reset karo taaki dobara start ho sake
            display.textContent = "Timer ruk gaya";
            console.log("Timer ruk gaya");
        }
    });

    /*
     setInterval Tips:
     - intervalId hamesha store karo taaki baad me clear kar sako
     - Multiple intervals se bachne ke liye if-check lagao
     - Start/stop toggles ke liye clearInterval + null reset pattern use karo
     - setInterval exact timing guarantee nahi karta — callback queue me jaata hai
    */
</script>
</html>
