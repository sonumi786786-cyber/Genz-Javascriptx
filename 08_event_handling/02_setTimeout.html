<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>setTimeout aur clearTimeout — Modern JS</title>
</head>
<body style="background-color: #212121; color: #fff; font-family: system-ui, sans-serif; padding: 20px;">
    <h1>Chai aur Code</h1>
    <button id="stop" style="padding: 10px 20px; font-size: 16px; cursor: pointer;">Stop Timer</button>
</body>
<script>
    // ============================================
    // setTimeout aur clearTimeout — Modern JS
    // ============================================

    // setTimeout ek function ko delay ke baad EK BAAR run karne ke liye schedule karta hai

    const changeText = () => {
        document.querySelector('h1').textContent = "Best JS Series";
    };

    // 2 second baad text change schedule karo
    const timerId = setTimeout(changeText, 2000);

    // "Stop" button click karke scheduled change cancel karo
    document.querySelector('#stop').addEventListener('click', () => {
        clearTimeout(timerId);
        console.log("Timer STOPPED — text change cancel ho gaya");
        document.querySelector('h1').textContent = "Timer stop ho gaya";
    }, { once: true }); // { once: true } — pehle click ke baad listener auto-remove ho jayega
</script>
</html>
