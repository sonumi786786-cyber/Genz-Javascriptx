<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Events — Bubbling, Delegation aur Prevention</title>
</head>
<body style="background-color: #414141; color: aliceblue; font-family: system-ui, sans-serif; padding: 20px;">
    <h2>Amazing Images</h2>
    <div>
        <ul id="images">
            <li><img width="200px" id="photoshop" src="https://images.pexels.com/photos/3561339/pexels-photo-3561339.jpeg?auto=compress&cs=tinysrgb&w=1600&lazy=load" alt="photoshop"></li>
            <li><img width="200px" id="japan" src="https://images.pexels.com/photos/3532553/pexels-photo-3532553.jpeg?auto=compress&cs=tinysrgb&w=1600&lazy=load" alt="japan"></li>
            <li><img width="200px" id="river" src="https://images.pexels.com/photos/3532551/pexels-photo-3532551.jpeg?auto=compress&cs=tinysrgb&w=1600&lazy=load" alt="river"></li>
            <li><img width="200px" id="owl" src="https://images.pexels.com/photos/3532552/pexels-photo-3532552.jpeg?auto=compress&cs=tinysrgb&w=1600&lazy=load" alt="owl"></li>
            <li><img width="200px" id="prayer" src="https://images.pexels.com/photos/2522671/pexels-photo-2522671.jpeg?auto=compress&cs=tinysrgb&w=1600&lazy=load" alt="prayer"></li>
            <li><a style="color: aliceblue;" href="https://google.com" id="google">Google</a></li>
        </ul>
   </div>
</body>
<script>
    // ============================================
    // Event Properties Reference:
    // ============================================
    // type, timestamp, defaultPrevented
    // target, srcElement, currentTarget
    // clientX, clientY, screenX, screenY
    // altKey, ctrlKey, shiftKey, keyCode

    // -----------------------------------------
    // Event Delegation — EK listener saare clicks handle karta hai
    // -----------------------------------------

    // Har <img> pe alag listener lagane ki jagah, parent <ul> pe ek listener lagao
    // aur e.target se check karo ki actually kya click hua

    document.querySelector('#images').addEventListener('click', (e) => {
        console.log("Clicked tag:", e.target.tagName);

        // Image clicks handle karo — parent <li> remove karo
        if (e.target.tagName === 'IMG') {
            console.log("Removing image:", e.target.id);

            // closest() nearest ancestor dhundhta hai jo selector match kare
            const listItem = e.target.closest('li');
            listItem?.remove(); // Optional chaining + remove()
        }

        // Link clicks handle karo — navigation roko
        if (e.target.tagName === 'A') {
            e.preventDefault();       // Navigation cancel karo
            e.stopPropagation();       // Event ko bubble hone se roko
            console.log("Link click prevented:", e.target.id);
        }
    });

    // -----------------------------------------
    // AbortController — Modern listener removal (ES2024+)
    // -----------------------------------------

    // const controller = new AbortController();
    //
    // document.querySelector('#owl').addEventListener('click', () => {
    //     console.log("Owl clicked — yeh listener abort ho sakta hai");
    // }, { signal: controller.signal });
    //
    // // Baad me listener remove karne ke liye:
    // controller.abort();

    /*
     Event Propagation Phases:
     1. CAPTURE phase — event window se target tak NEECHE jaata hai
     2. TARGET phase  — event clicked element pe pahunchta hai
     3. BUBBLE phase  — event target se window tak UPAR jaata hai

     addEventListener('click', handler, true)  — CAPTURE me listen karo
     addEventListener('click', handler, false) — BUBBLE me listen karo (default)
    */
</script>
</html>
