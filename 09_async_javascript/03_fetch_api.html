<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Requests — Modern JavaScript</title>
</head>
<body style="background-color: #212121; color: #fff; font-family: system-ui, sans-serif; padding: 20px;">
    <h1>GitHub API — Modern Fetch</h1>
    <div id="output" style="font-family: monospace; margin-top: 20px;"></div>

    <!-- XHR Ready State Reference:
    0  UNSENT           Client created, open() not called
    1  OPENED           open() has been called
    2  HEADERS_RECEIVED send() called, headers available
    3  LOADING          Downloading, partial data available
    4  DONE             Operation complete
    -->
</body>
<script>
    // ============================================
    // 📌 API Requests — Modern JS (fetch + async/await)
    // ============================================

    const output = document.querySelector('#output');
    const API_URL = 'https://api.github.com/users/deepakchoudhary';

    // ─────────────────────────────────────────────
    // 🔹 ✅ Modern Way: fetch + async/await
    // ─────────────────────────────────────────────

    const fetchGitHubUser = async (url) => {
        try {
            const response = await fetch(url);

            // ✅ Always check if response is ok (status 200-299)
            if (!response.ok) {
                throw new Error(`HTTP error! Status: ${response.status}`);
            }

            const data = await response.json();

            console.log("User data:", data);
            console.log("Followers:", data.followers);
            console.log("Public repos:", data.public_repos);

            // Display on page
            output.innerHTML = `
                <p><strong>Name:</strong> ${data.name}</p>
                <p><strong>Bio:</strong> ${data.bio}</p>
                <p><strong>Followers:</strong> ${data.followers}</p>
                <p><strong>Public Repos:</strong> ${data.public_repos}</p>
                <p><strong>Profile:</strong> <a href="${data.html_url}" style="color: #64b5f6;">${data.html_url}</a></p>
            `;
        } catch (error) {
            console.error("Fetch failed:", error.message);
            output.textContent = `Error: ${error.message}`;
        }
    };

    fetchGitHubUser(API_URL);

    // ─────────────────────────────────────────────

    //     if (xhr.readyState === 4) {
    //         const data = JSON.parse(this.responseText);
    //         console.log(data.followers);
    //     }
    // };
    // xhr.send();

    /*
     🧠 fetch() vs XMLHttpRequest:
     ─────────────────────────────────
     ✅ fetch() — Promise-based, cleaner syntax, supports async/await
     ✅ fetch() — Built-in AbortController for cancellation
     ✅ fetch() — Better error handling with response.ok
     ❌ XMLHttpRequest — callback-based, verbose, outdated
     ❌ XMLHttpRequest — No native Promise support
    */
</script>
